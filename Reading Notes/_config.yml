# Site settings
title: 读书心得
email: your-email@example.com
description: >-
  分享我的读书心得和笔记，记录阅读旅程中的思考和收获。
baseurl: ""
url: "https://yourusername.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Collections
collections:
  books:
    output: true
    permalink: /books/:name/

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Theme settings
author:
  name: 读者
  bio: 一个热爱阅读的人

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
